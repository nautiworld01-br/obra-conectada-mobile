<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Obra Conectada</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <script>
      (function () {
        var SW_RELOAD_FLAG = "obra-sw-reload-pending";
        var isLocalhost =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";

        if (!("serviceWorker" in navigator)) {
          return;
        }

        var allowLocalServiceWorker =
          window.localStorage &&
          window.localStorage.getItem("obra-sw-local") === "enabled";

        if (isLocalhost && !allowLocalServiceWorker) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) {
                registration.unregister();
              });
            });
          });
          return;
        }

        window.addEventListener("load", function () {
          var hasReloadedForServiceWorker = false;

          navigator.serviceWorker.addEventListener("controllerchange", function () {
            if (hasReloadedForServiceWorker) {
              return;
            }

            hasReloadedForServiceWorker = true;

            try {
              if (window.sessionStorage && window.sessionStorage.getItem(SW_RELOAD_FLAG) !== "true") {
                window.sessionStorage.setItem(SW_RELOAD_FLAG, "true");
                window.location.reload();
                return;
              }

              if (window.sessionStorage) {
                window.sessionStorage.removeItem(SW_RELOAD_FLAG);
              }
            } catch (error) {
              window.location.reload();
              return;
            }
          });

          navigator.serviceWorker
            .register("./sw.js")
            .then(function (registration) {
              try {
                if (window.sessionStorage) {
                  window.sessionStorage.removeItem(SW_RELOAD_FLAG);
                }
              } catch (error) {}

              return registration.update().then(function () {
                return registration;
              });
            })
            .catch(function (error) {
              console.error("Falha ao registrar o service worker:", error);
            });
        });
      })();
    </script>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar JavaScript para rodar este app.</noscript>
    <div id="root"></div>
  </body>
</html>
