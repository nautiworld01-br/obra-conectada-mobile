<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Obra Conectada</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <script>
      (function () {
        var BUILD_ID = "__BUILD_ID__";
        var SW_URL = "__SW_URL__";
        var BUILD_INFO_URL = "./build.json?v=" + BUILD_ID;
        var SW_RELOAD_FLAG = "obra-sw-reload-pending";
        var BUILD_RELOAD_FLAG = "obra-build-reload-pending";
        var isLocalhost =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";

        window.__OBRA_BUILD_ID__ = BUILD_ID;
        window.__OBRA_SW_URL__ = SW_URL;

        if (!("serviceWorker" in navigator)) {
          return;
        }

        var allowLocalServiceWorker =
          window.localStorage &&
          window.localStorage.getItem("obra-sw-local") === "enabled";

        if (isLocalhost && !allowLocalServiceWorker) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) {
                registration.unregister();
              });
            });
          });
          return;
        }

        function reloadWithCacheBust() {
          try {
            var nextUrl = new URL(window.location.href);
            nextUrl.searchParams.set("refresh", Date.now().toString());
            window.location.replace(nextUrl.toString());
            return;
          } catch (error) {
            window.location.reload();
          }
        }

        function fetchLatestBuild() {
          return fetch("./build.json?ts=" + Date.now(), { cache: "no-store" })
            .then(function (response) {
              if (!response.ok) {
                return null;
              }

              return response.json();
            })
            .catch(function () {
              return null;
            });
        }

        function registerServiceWorker() {
          var hasReloadedForServiceWorker = false;

          navigator.serviceWorker.addEventListener("controllerchange", function () {
            if (hasReloadedForServiceWorker) {
              return;
            }

            hasReloadedForServiceWorker = true;

            try {
              if (window.sessionStorage && window.sessionStorage.getItem(SW_RELOAD_FLAG) !== "true") {
                window.sessionStorage.setItem(SW_RELOAD_FLAG, "true");
                reloadWithCacheBust();
                return;
              }

              if (window.sessionStorage) {
                window.sessionStorage.removeItem(SW_RELOAD_FLAG);
              }
            } catch (error) {
              reloadWithCacheBust();
              return;
            }
          });

          return navigator.serviceWorker
            .register(SW_URL)
            .then(function (registration) {
              try {
                if (window.sessionStorage) {
                  window.sessionStorage.removeItem(SW_RELOAD_FLAG);
                }
              } catch (error) {}

              return registration.update().then(function () {
                return registration;
              });
            });
        }

        window.addEventListener("load", function () {
          fetchLatestBuild()
            .then(function (latestBuild) {
              if (
                latestBuild &&
                latestBuild.buildId &&
                latestBuild.buildId !== BUILD_ID
              ) {
                try {
                  if (window.sessionStorage && window.sessionStorage.getItem(BUILD_RELOAD_FLAG) !== latestBuild.buildId) {
                    window.sessionStorage.setItem(BUILD_RELOAD_FLAG, latestBuild.buildId);
                    reloadWithCacheBust();
                    return null;
                  }

                  if (window.sessionStorage) {
                    window.sessionStorage.removeItem(BUILD_RELOAD_FLAG);
                  }
                } catch (error) {
                  reloadWithCacheBust();
                  return null;
                }
              }

              return registerServiceWorker();
            })
            .catch(function (error) {
              console.error("Falha ao registrar o service worker:", error);
            });
        });
      })();
    </script>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar JavaScript para rodar este app.</noscript>
    <div id="root"></div>
  </body>
</html>
